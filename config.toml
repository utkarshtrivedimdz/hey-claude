# hey-claude config (FR-5). All keys optional — omitted keys use defaults.

[wake]
phrase = "hey jarvis"   # display label only; the spoken trigger is whatever `model` (or the
                        # pretrained_fallback) detects — "hey jarvis" until you train "hey claude".
# Path to your trained openWakeWord model (see scripts/train-wake-word.md).
# Empty => fall back to a pretrained phrase so the daemon still runs end-to-end.
model = ""
pretrained_fallback = "hey_jarvis"
# onnx is required on macOS (tflite_runtime has no arm64 wheels; the default 'tflite'
# framework silently zeroes the preprocessor → all scores 0.0).
framework = "onnx"
threshold = 0.5        # Safe default. Tuning finding (2026-07-06): on quiet-voice OnePlus Buds
                       # audio, real attempts clustered 0.157–0.276 as sub-threshold near-misses,
                       # so a personal machine may want ~0.15 IF false wakes are acceptable. Keep
                       # that machine-specific value in ~/.config/hey-claude/config.toml, not here —
                       # 0.15 would false-trigger constantly on most mics/environments.
log_floor = 0.3        # log near-miss scores >= this (for threshold tuning)
# mic_device = 1       # sounddevice device index; omit for default input

[dictation]
# hey-claude starts/stops dictation by AXPress-ing the Claude panel's Voice-dictation button
# (NOT Cmd+D — that collided with VS Code's multi-cursor shortcut). The button's
# AXDescription is the ground truth for whether recording is on; an AXObserver on it
# drives the DICTATING state event-driven. Override only if the extension renames it.
button_desc_off = "Voice dictation"   # AXDescription when OFF
button_desc_on  = "Stop recording"    # AXDescription when ON (blue/recording)

[commands]
# Option A: command word is dictated into the box then stripped. A required prefix
# disambiguates from a prompt that legitimately ends in a command word (Q11b).
prefix = ["okay", "ok"]

# Press-by-name: "<prefix> press <label>" AXPresses the control whose label CONTAINS
# <label> (case-insensitive), e.g. "okay press submit" → the "Submit answers" button,
# "okay press yes" → the "Yes" radio option in a Claude Code question dialog. `press_roles`
# is the set of AX roles searched. Only the ACTIVE Claude Code tab is in the a11y tree.
press_verbs = ["press"]
press_roles = ["AXButton", "AXRadioButton"]

[commands.words]
send   = ["send", "submit", "go", "enter"]
cancel = ["cancel", "scratch that", "nevermind", "never mind", "clear", "clear all"]
stop   = ["stop", "interrupt", "abort"]

[fixups]
# Dictation mishears proper nouns; map mishearing → correction. Applied to the prompt
# after the trailing command is stripped and before Return (case-insensitive, whole-word;
# longest key wins). Only a real change triggers the read→rewrite path — otherwise the
# fast backspace+Return send is untouched.
"clot code" = "Claude Code"
"clod code" = "Claude Code"
clot = "Claude"
clod = "Claude"

[target]
# The VS Code window hey-claude is allowed to type into (focus-safety gate). Set these to
# YOUR target. Keep your real values in ~/.config/hey-claude/config.toml — it is loaded
# before this file, so this tracked copy stays a generic example.
bundle_id    = "com.microsoft.VSCode"
workspace    = "/path/to/your-project.code-workspace"   # absolute path to your .code-workspace
title_substr = "your-project (Workspace)"               # a substring unique to that window's title

[timeouts]
arm_s = 8.0            # max time ARMED (dictation requested) before auto-disarm if the button
                       # never turns on. There is deliberately NO silence/disarm timeout while
                       # DICTATING — the Voice-dictation button is the sole authority; a turn ends
                       # on a command word or a button-off event (OS/user turning the mic off).
correction_window_ms = 5000

[telemetry]
enabled = true
retention_days = 30
store_prompt_text = "full"   # full | hash | length_only | off
log_dir = "~/Library/Logs/hey-claude"
